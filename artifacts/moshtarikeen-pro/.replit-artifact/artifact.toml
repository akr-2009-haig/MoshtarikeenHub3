kind = "web"
previewPath = "/"
title = "Moshtarikeen Hub PRO"
version = "1.0.0"
id = "artifacts/moshtarikeen-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18929

[services.development]
run = "pnpm --filter @workspace/moshtarikeen-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moshtarikeen-pro", "run", "build" ]
publicDir = "artifacts/moshtarikeen-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18929"
BASE_PATH = "/"
